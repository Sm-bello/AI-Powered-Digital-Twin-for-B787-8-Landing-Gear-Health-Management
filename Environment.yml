name: aerospace
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - scipy
  - h5py
  - pip
  - pip:
    - torch==2.5.1
    - torchvision
    - torchaudio
    - flask
    - flask-cors
    - requests
    - anthropic
    - wandb
    - tqdm
    - openpyxl
